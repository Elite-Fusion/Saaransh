# =========================================================
# Alembic configuration for Saaransh AI backend
#
# NOTE: sqlalchemy.url is overridden at runtime in env.py
# so the real DATABASE_URL never needs to live in this file.
# =========================================================

[alembic]
script_location = backend/alembic
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# DB URL is injected from backend.config.settings (see env.py)
# sqlalchemy.url = driver://user:pass@host:port/dbname

[post_write_hooks]
# Optional: auto-format migration files with black when generated.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
